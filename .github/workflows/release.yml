name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package, for example v0.1.0"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  binary:
    name: Linux amd64 Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build archive and checksums
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -eu
          mkdir -p dist/pkg
          CGO_ENABLED=1 go build -tags sqlite_omit_load_extension -trimpath -ldflags="-s -w" -o dist/pkg/fibe-distilled ./cmd/fibe-distilled
          tar -C dist/pkg -czf "dist/fibe-distilled_${TAG}_linux_amd64.tar.gz" fibe-distilled
          (cd dist && sha256sum "fibe-distilled_${TAG}_linux_amd64.tar.gz" > checksums.txt)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -eu
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --generate-notes
          fi

  image:
    name: GHCR Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image name
        id: image
        run: |
          set -eu
          image="ghcr.io/${GITHUB_REPOSITORY}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.event.inputs.tag || github.ref_name }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
